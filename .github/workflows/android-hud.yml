name: Android HUD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4

      - name: Pin Android SDK platform
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          find "$ANDROID_HOME/platforms" -mindepth 1 -maxdepth 1 -type d ! -name android-36 -exec rm -rf {} +
          ls "$ANDROID_HOME/platforms"

      - name: Verify HUD build
        run: |
          ./gradlew --no-daemon --max-workers=1 \
            :app:lintHudRelease \
            :app:testHudDebugUnitTest \
            :app:assembleHudDebug \
            :app:bundleHudRelease \
            -POPENCLAW_ANDROID_ALLOW_UNSIGNED_RELEASE=true
          node scripts/verify-play-hud-release.mjs \
            --bundle app/build/outputs/bundle/hudRelease/app-hud-release.aab \
            --skip-signature
          node scripts/verify-airvision-firmware-capture-results.mjs
          node scripts/test-airvision-firmware-capture-results.mjs
          node scripts/test-airvision-firmware-capture-plan-renderer.mjs
          node scripts/test-play-hud-release-verifier.mjs
          bash -n scripts/diagnose-hud-presentation.sh
          bash -n scripts/install-launch-hud.sh
          bash -n scripts/capture-play-screenshots.sh
          node scripts/test-play-screenshot-tools.mjs
          node scripts/render-play-screenshots.mjs --check
          node scripts/render-play-console-handoff.mjs --check
          node scripts/render-privacy-policy-site.mjs --check
          node scripts/verify-play-submission-package.mjs
          node scripts/test-play-submission-verifier.mjs
          node scripts/test-play-publish-helper.mjs
          node scripts/publish-play-internal.mjs --dry-run
