name: Android HUD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4

      - name: Verify HUD build
        run: |
          ./gradlew --no-daemon --max-workers=1 \
            :app:lintHudRelease \
            :app:testHudDebugUnitTest \
            :app:assembleHudDebug \
            :app:bundleHudRelease \
            -POPENCLAW_ANDROID_ALLOW_UNSIGNED_RELEASE=true
          node scripts/verify-play-hud-release.mjs \
            --bundle app/build/outputs/bundle/hudRelease/app-hud-release.aab \
            --skip-signature
          bash -n scripts/capture-play-screenshots.sh
          node scripts/test-play-screenshot-tools.mjs
          node scripts/render-privacy-policy-site.mjs --check
          node scripts/verify-play-submission-package.mjs
