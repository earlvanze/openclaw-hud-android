<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1024, initial-scale=1" />
    <title>OpenClaw HUD feature graphic</title>
    <style>
      @font-face {
        font-family: Manrope;
        font-style: normal;
        font-weight: 400;
        src: url("../../app/src/main/res/font/manrope_400_regular.ttf");
      }

      @font-face {
        font-family: Manrope;
        font-style: normal;
        font-weight: 600;
        src: url("../../app/src/main/res/font/manrope_600_semibold.ttf");
      }

      @font-face {
        font-family: Manrope;
        font-style: normal;
        font-weight: 700;
        src: url("../../app/src/main/res/font/manrope_700_bold.ttf");
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1024px;
        height: 500px;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #090b0a;
        color: #ffffff;
        font-family: Manrope, sans-serif;
        letter-spacing: 0;
      }

      .graphic {
        display: grid;
        grid-template-columns: 346px 1fr;
        width: 100%;
        height: 100%;
      }

      .brand {
        display: grid;
        place-items: center;
        background: #e51a0b;
        border-right: 6px solid #5cff90;
      }

      .brand img {
        width: 250px;
        height: 250px;
        object-fit: contain;
      }

      .copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin: 0 74px 0 44px;
        border-top: 2px solid #2f3b34;
        border-bottom: 2px solid #2f3b34;
      }

      h1 {
        margin: 0;
        font-size: 64px;
        font-weight: 700;
        line-height: 1.04;
      }

      .offer {
        margin-top: 24px;
        color: #5cff90;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.25;
      }

      .features,
      .displays {
        margin-top: 22px;
        font-size: 27px;
        line-height: 1.25;
      }

      .displays {
        margin-top: 8px;
        color: #aebbb3;
        font-size: 22px;
      }

      .separator {
        color: #e51a0b;
        padding: 0 9px;
      }
    </style>
  </head>
  <body>
    <main class="graphic">
      <section class="brand">
        <img src="../../app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png" alt="" />
      </section>
      <section class="copy">
        <h1>OPENCLAW HUD</h1>
        <div class="offer">ASSISTANT HUD FOR EXTERNAL DISPLAYS</div>
        <div class="features">
          Chat<span class="separator">/</span>Voice<span class="separator">/</span>Captions<span class="separator">/</span>Notifications
        </div>
        <div class="displays">USB-C / HDMI / Wireless / Wearable</div>
      </section>
    </main>
  </body>
</html>
